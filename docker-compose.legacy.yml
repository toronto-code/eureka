version: "3.9"

# -----------------------------------------------------------------------------
# Mycelium docker-compose
# -----------------------------------------------------------------------------
# Single `docker compose up --build` brings up the entire stack EXCEPT the
# observer (which runs locally on developer machines — see services/observer).
#
# A one-shot `seed` container runs after the API is healthy and inserts fake
# events, fake graph nodes, fake integration_syncs rows, and fake agent
# activity so the UI is non-empty on first run.
# -----------------------------------------------------------------------------

x-env: &default-env
  DEV_MODE: ${DEV_MODE:-true}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  ENVIRONMENT: ${ENVIRONMENT:-local}
  POSTGRES_DSN: postgresql://mycelium:mycelium@postgres:5432/mycelium
  POSTGRES_HOST: postgres
  POSTGRES_PORT: 5432
  POSTGRES_DB: mycelium
  POSTGRES_USER: mycelium
  POSTGRES_PASSWORD: mycelium
  REDIS_URL: redis://redis:6379/0
  REDIS_HOST: redis
  REDIS_PORT: 6379
  NEO4J_URI: bolt://neo4j:7687
  NEO4J_USER: neo4j
  NEO4J_PASSWORD: mycelium-neo4j
  API_URL: http://api:8000
  KNOWLEDGE_URL: http://knowledge:8001
  AGENT_RUNTIME_URL: http://agent-runtime:8002
  INTEGRATIONS_URL: http://integrations:8003
  PROCESS_INTEL_URL: http://process-intel:8004
  LEARNING_URL: http://learning:8005
  SECURITY_URL: http://security:8006
  JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
  DEV_USER_ID: ${DEV_USER_ID:-dev-user-1}
  DEV_USER_EMAIL: ${DEV_USER_EMAIL:-dev@mycelium.local}
  CLASSIFICATION_RETRY_LIMIT: ${CLASSIFICATION_RETRY_LIMIT:-3}
  SECURITY_ENFORCEMENT_ENABLED: ${SECURITY_ENFORCEMENT_ENABLED:-false}
  # Embeddings — hash provider works without API keys; flip to "openai" in prod.
  EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-hash}
  EMBEDDING_POLL_SECONDS: ${EMBEDDING_POLL_SECONDS:-30}
  EMBEDDING_BATCH_SIZE: ${EMBEDDING_BATCH_SIZE:-50}
  EMBEDDING_TYPE_DENYLIST: ${EMBEDDING_TYPE_DENYLIST:-health,heartbeat,integration_sync.}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  # Mycelium intelligence chat secrets (read by chat_intel router)
  GITHUB_TOKEN: ${GITHUB_TOKEN:-}
  GITHUB_USERNAME: ${GITHUB_USERNAME:-}
  SLACK_TOKEN: ${SLACK_TOKEN:-}
  JIRA_TOKEN: ${JIRA_TOKEN:-}
  JIRA_EMAIL: ${JIRA_EMAIL:-}
  JIRA_DOMAIN: ${JIRA_DOMAIN:-}
  MYCELIUM_AGENT_WRITES_ENABLED: ${MYCELIUM_AGENT_WRITES_ENABLED:-true}
  # Security guardrails for the agent. Comma-separated lists.
  # If any allowlist is empty, that category is unrestricted.
  MYCELIUM_REPO_ALLOWLIST: ${MYCELIUM_REPO_ALLOWLIST:-}
  MYCELIUM_REPO_DENYLIST: ${MYCELIUM_REPO_DENYLIST:-}
  MYCELIUM_SLACK_CHANNEL_ALLOWLIST: ${MYCELIUM_SLACK_CHANNEL_ALLOWLIST:-}
  MYCELIUM_JIRA_PROJECT_ALLOWLIST: ${MYCELIUM_JIRA_PROJECT_ALLOWLIST:-}
  MYCELIUM_MAX_WRITES_PER_MIN: ${MYCELIUM_MAX_WRITES_PER_MIN:-20}
  # Supabase (replaces local Postgres for app-level data)
  SUPABASE_URL: ${SUPABASE_URL:-}
  SUPABASE_PUBLISHABLE_KEY: ${SUPABASE_PUBLISHABLE_KEY:-}
  SUPABASE_SECRET_KEY: ${SUPABASE_SECRET_KEY:-}
  # Agent memory tuning.
  MEMORY_BUFFER_SIZE: ${MEMORY_BUFFER_SIZE:-20}
  MEMORY_TTL_SECONDS: ${MEMORY_TTL_SECONDS:-3600}
  MEMORY_LRU_CAP: ${MEMORY_LRU_CAP:-100}
  LONGTERM_MEMORY_TOP_K: ${LONGTERM_MEMORY_TOP_K:-5}
  LONGTERM_MEMORY_SCOPE: ${LONGTERM_MEMORY_SCOPE:-agent_user}
  # Process-intel tuning.
  PROCESS_INTEL_INTERVAL: ${PROCESS_INTEL_INTERVAL:-600}
  PROCESS_INTEL_WINDOW_DAYS: ${PROCESS_INTEL_WINDOW_DAYS:-30}
  PROCESS_INTEL_ROW_CAP: ${PROCESS_INTEL_ROW_CAP:-10000}

services:
  # --- Infra ----------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: mycelium
      POSTGRES_USER: mycelium
      POSTGRES_PASSWORD: mycelium
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mycelium -d mycelium"]
      interval: 5s
      timeout: 5s
      retries: 20

  neo4j:
    image: neo4j:5.20
    environment:
      NEO4J_AUTH: neo4j/mycelium-neo4j
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"   # http
      - "7687:7687"   # bolt
    volumes:
      - neo4jdata:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  # --- API gateway (also runs the events ingestion worker) ------------------
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      <<: *default-env
    ports: ["8000:8000"]
    volumes:
      - //var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 20

  # --- Frontend -------------------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-${SUPABASE_URL:-}}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${VITE_SUPABASE_PUBLISHABLE_KEY:-${SUPABASE_PUBLISHABLE_KEY:-}}
    ports: ["5173:5173"]
    depends_on:
      - api

  # --- Backend services -----------------------------------------------------
  knowledge:
    build:
      context: .
      dockerfile: services/knowledge/Dockerfile
    environment:
      <<: *default-env
    ports: ["8001:8001"]
    depends_on:
      postgres: { condition: service_healthy }
      neo4j:    { condition: service_healthy }
      redis:    { condition: service_healthy }

  agent-runtime:
    build:
      context: .
      dockerfile: services/agent-runtime/Dockerfile
    environment:
      <<: *default-env
    ports: ["8002:8002"]
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }

  integrations:
    build:
      context: .
      dockerfile: services/integrations/Dockerfile
    environment:
      <<: *default-env
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
      JIRA_BASE_URL: ${JIRA_BASE_URL:-}
      JIRA_EMAIL: ${JIRA_EMAIL:-}
      JIRA_API_TOKEN: ${JIRA_API_TOKEN:-}
      INTEGRATIONS_SYNC_INTERVAL: ${INTEGRATIONS_SYNC_INTERVAL:-300}
    ports: ["8003:8003"]
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }

  process-intel:
    build:
      context: .
      dockerfile: services/process-intel/Dockerfile
    environment:
      <<: *default-env
    ports: ["8004:8004"]
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }

  learning:
    build:
      context: .
      dockerfile: services/learning/Dockerfile
    environment:
      <<: *default-env
    ports: ["8005:8005"]
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }

  security:
    build:
      context: .
      dockerfile: services/security/Dockerfile
    environment:
      <<: *default-env
    ports: ["8006:8006"]
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }

  # --- Seed (one-shot) ------------------------------------------------------
  seed:
    build:
      context: .
      dockerfile: scripts/seed/Dockerfile
    environment:
      <<: *default-env
    depends_on:
      api:       { condition: service_healthy }
    restart: "no"

  # NOTE: services/observer is intentionally excluded.
  # It runs LOCALLY on developer machines. See services/observer/README.md.

volumes:
  pgdata:
  neo4jdata:
