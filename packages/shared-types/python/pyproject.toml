[tool.poetry]
name = "mycelium-shared-types"
version = "0.1.0"
description = "Shared Pydantic schemas for all Mycelium services."
authors = ["Mycelium <dev@mycelium.local>"]
readme = "../README.md"
packages = [{ include = "mycelium_shared_types", from = "src" }]

[tool.poetry.dependencies]
python = "^3.11"
pydantic = "^2.7.0"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
