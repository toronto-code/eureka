[tool.poetry]
name = "mycelium-embeddings"
version = "0.1.0"
description = "Embedding provider abstraction (hash + OpenAI) for Mycelium services."
authors = ["Mycelium <dev@mycelium.local>"]
readme = "../README.md"
packages = [{ include = "mycelium_embeddings", from = "src" }]

[tool.poetry.dependencies]
python = "^3.11"
httpx = "^0.27.0"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
