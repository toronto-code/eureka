# -----------------------------------------------------------------------------
# Mycelium MVP docker-compose
# -----------------------------------------------------------------------------
# Brings up the focused foundation: Postgres+pgvector + FastAPI backend
# (apps/api/app) + Next.js frontend (apps/web).
#
# `docker-compose.legacy.yml` keeps the older multi-service experiment alive.
# -----------------------------------------------------------------------------

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: mycelium
      POSTGRES_USER: mycelium
      POSTGRES_PASSWORD: mycelium
    ports:
      - "5432:5432"
    volumes:
      - mycelium_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mycelium -d mycelium"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.mycelium
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-local}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DEV_MODE: ${DEV_MODE:-true}
      POSTGRES_DSN: postgresql+psycopg://mycelium:mycelium@postgres:5432/mycelium
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_DEFAULT_MODEL: ${OPENAI_DEFAULT_MODEL:-gpt-4o}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      JIRA_BASE_URL: ${JIRA_BASE_URL:-}
      JIRA_EMAIL: ${JIRA_EMAIL:-}
      JIRA_API_TOKEN: ${JIRA_API_TOKEN:-}
      JIRA_PROJECT_KEY: ${JIRA_PROJECT_KEY:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_OWNER: ${GITHUB_OWNER:-}
      GITHUB_REPO: ${GITHUB_REPO:-}
      GITHUB_DEFAULT_BASE_BRANCH: ${GITHUB_DEFAULT_BASE_BRANCH:-main}
      GITHUB_ALLOWED_WRITE_PATHS: ${GITHUB_ALLOWED_WRITE_PATHS:-}
      MYCELIUM_BOT_JIRA_USER: ${MYCELIUM_BOT_JIRA_USER:-}
      MYCELIUM_BOT_NAME: ${MYCELIUM_BOT_NAME:-Mycelium Bot}
      MYCELIUM_AUTO_EXECUTE: ${MYCELIUM_AUTO_EXECUTE:-true}
      MYCELIUM_ALLOW_REAL_GITHUB: ${MYCELIUM_ALLOW_REAL_GITHUB:-false}
      JIRA_WATCHER_ENABLED: ${JIRA_WATCHER_ENABLED:-false}
      JIRA_WATCHER_INTERVAL_SECONDS: ${JIRA_WATCHER_INTERVAL_SECONDS:-60}
      JIRA_WATCHER_EXTRA_JQL: ${JIRA_WATCHER_EXTRA_JQL:-}
      FRONTEND_ORIGIN: http://localhost:3000
      ENABLE_DEMO_SEED: ${ENABLE_DEMO_SEED:-true}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"
      interval: 10s
      timeout: 5s
      retries: 20

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    environment:
      BACKEND_URL: http://api:8000
      NEXT_PUBLIC_BACKEND_URL: http://localhost:8000
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  mycelium_pgdata:
