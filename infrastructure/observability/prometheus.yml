global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: api
    static_configs:
      - targets: ["api:8000"]
    metrics_path: /metrics

  - job_name: knowledge
    static_configs:
      - targets: ["knowledge:8001"]
    metrics_path: /metrics

  - job_name: agent-runtime
    static_configs:
      - targets: ["agent-runtime:8002"]
    metrics_path: /metrics

  - job_name: integrations
    static_configs:
      - targets: ["integrations:8003"]
    metrics_path: /metrics

  - job_name: process-intel
    static_configs:
      - targets: ["process-intel:8004"]
    metrics_path: /metrics

  - job_name: learning
    static_configs:
      - targets: ["learning:8005"]
    metrics_path: /metrics

  - job_name: security
    static_configs:
      - targets: ["security:8006"]
    metrics_path: /metrics
