steps:
  - name: gcr.io/cloud-builders/docker
    args: ["build", "-f", "apps/api/Dockerfile", "-t", "$_REGION-docker.pkg.dev/$PROJECT_ID/mycelium/api:$SHORT_SHA", "."]
  - name: gcr.io/cloud-builders/docker
    args: ["build", "-f", "apps/frontend/Dockerfile", "-t", "$_REGION-docker.pkg.dev/$PROJECT_ID/mycelium/frontend:$SHORT_SHA", "."]
  - name: gcr.io/cloud-builders/docker
    args: ["build", "-f", "services/knowledge/Dockerfile", "-t", "$_REGION-docker.pkg.dev/$PROJECT_ID/mycelium/knowledge:$SHORT_SHA", "."]
  - name: gcr.io/cloud-builders/docker
    args: ["build", "-f", "services/agent-runtime/Dockerfile", "-t", "$_REGION-docker.pkg.dev/$PROJECT_ID/mycelium/agent-runtime:$SHORT_SHA", "."]
  - name: gcr.io/cloud-builders/docker
    args: ["build", "-f", "services/integrations/Dockerfile", "-t", "$_REGION-docker.pkg.dev/$PROJECT_ID/mycelium/integrations:$SHORT_SHA", "."]
  - name: gcr.io/cloud-builders/docker
    args: ["build", "-f", "services/process-intel/Dockerfile", "-t", "$_REGION-docker.pkg.dev/$PROJECT_ID/mycelium/process-intel:$SHORT_SHA", "."]
  - name: gcr.io/cloud-builders/docker
    args: ["build", "-f", "services/learning/Dockerfile", "-t", "$_REGION-docker.pkg.dev/$PROJECT_ID/mycelium/learning:$SHORT_SHA", "."]
  - name: gcr.io/cloud-builders/docker
    args: ["build", "-f", "services/security/Dockerfile", "-t", "$_REGION-docker.pkg.dev/$PROJECT_ID/mycelium/security:$SHORT_SHA", "."]

images:
  - $_REGION-docker.pkg.dev/$PROJECT_ID/mycelium/api:$SHORT_SHA
  - $_REGION-docker.pkg.dev/$PROJECT_ID/mycelium/frontend:$SHORT_SHA
  - $_REGION-docker.pkg.dev/$PROJECT_ID/mycelium/knowledge:$SHORT_SHA
  - $_REGION-docker.pkg.dev/$PROJECT_ID/mycelium/agent-runtime:$SHORT_SHA
  - $_REGION-docker.pkg.dev/$PROJECT_ID/mycelium/integrations:$SHORT_SHA
  - $_REGION-docker.pkg.dev/$PROJECT_ID/mycelium/process-intel:$SHORT_SHA
  - $_REGION-docker.pkg.dev/$PROJECT_ID/mycelium/learning:$SHORT_SHA
  - $_REGION-docker.pkg.dev/$PROJECT_ID/mycelium/security:$SHORT_SHA

substitutions:
  _REGION: us-central1

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
